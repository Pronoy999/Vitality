server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:./application-local.properties,optional:file:${VITALITY_API_CONFIG:}
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    properties:
      hibernate:
        default_schema: ${SPRING_JPA_DEFAULT_SCHEMA:vitality}

google:
  client:
    id: ${GOOGLE_CLIENT_ID:}

jwt:
  secret:
    key: ${JWT_SECRET_KEY:}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
